name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan 89.167.102.3 >> ~/.ssh/known_hosts
      - name: Deploy
        run: ssh root@89.167.102.3 "cd /root/delim && git pull && pm2 restart delim"
